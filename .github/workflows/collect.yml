name: GETS daily collect

on:
  schedule:
    - cron: "30 17 * * *"
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collector
        run: python collect.py

      - name: Commit new data
        run: |
          git config user.name "winrate-collector"
          git config user.email "collector@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data this run."
          else
            git commit -m "Collect $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
